services:
  transactions-db:
    build:
      context: ./docker/postgres-db
    environment:
      - POSTGRES_USER=finance_db_user
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=finance_db
    volumes:
        - pg-data:/var/lib/postgresql/data
        - "${PWD}/db-scripts/initialize_db_ddl.sql:/docker-entrypoint-initdb.d/initialize_db_ddl.sql"
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "hot_standby=on"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_db_user -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  kafka-connect:
    image: debezium/connect:2.4
    depends_on:
      kafka:
        condition: service_started
      transactions-db:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "8083:8083"

  debezium-init:
    image: curlimages/curl:latest
    depends_on:
      - kafka-connect
    volumes:
      - "${PWD}/debezium/init-connectors.sh:/init-connectors.sh"
      - "${PWD}/debezium/connectors:/connectors"
    entrypoint: ["/bin/sh", "/init-connectors.sh"]
    restart: "no"

  api:
    build:
      context: ./api
    environment:
      - ANALYTICS_HOST=analytics-db
      - ANALYTICS_PORT=5432
      - ANALYTICS_DB=analytics_db
      - ANALYTICS_USER=analytics_user
      - ANALYTICS_PASSWORD=analytics_1234
    depends_on:
      analytics-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  ingestion:
    build:
      context: ./ingestion
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ANALYTICS_HOST=analytics-db
      - ANALYTICS_PORT=5432
      - ANALYTICS_DB=analytics_db
      - ANALYTICS_USER=analytics_user
      - ANALYTICS_PASSWORD=analytics_1234
    depends_on:
      analytics-db:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  analytics-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=analytics_user
      - POSTGRES_PASSWORD=analytics_1234
      - POSTGRES_DB=analytics_db
    volumes:
      - analytics-pg-data:/var/lib/postgresql/data
      - "${PWD}/db-scripts/analytics_init.sql:/docker-entrypoint-initdb.d/analytics_init.sql"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.51.4
    depends_on:
      analytics-db:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    ports:
      - "3000:3000"

  sql-client:
    image: postgres:15-alpine
    depends_on:
      - transactions-db
      - analytics-db
    environment:
      - PGPASSWORD=1234
    volumes:
      - ./db-scripts:/db-scripts
      - ./sql-queries:/sql-queries
    command: >
      sh -c "
        echo 'SQL Client Container Ready!';
        echo 'Connect to source DB: psql -h transactions-db -U finance_db_user -d finance_db';
        echo 'Connect to analytics DB: psql -h analytics-db -U analytics_user -d analytics_db';
        echo '';
        echo 'Example commands:';
        echo '  docker exec -it <container_name> psql -h transactions-db -U finance_db_user -d finance_db';
        echo '  docker exec -it <container_name> psql -h analytics-db -U analytics_user -d analytics_db';
        echo '';
        tail -f /dev/null
      "
    profiles:
      - sql-tools

  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      - transactions-db
      - analytics-db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@acme.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    profiles:
      - sql-tools

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
      - kafka-connect
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: kafka-connect:8083
    ports:
      - "8080:8080"
    profiles:
      - monitoring

  tests:
    build:
      context: ./tests
    environment:
      - ANALYTICS_HOST=analytics-db
      - ANALYTICS_PORT=5432
      - ANALYTICS_DB=analytics_db
      - ANALYTICS_USER=analytics_user
      - ANALYTICS_PASSWORD=analytics_1234
    depends_on:
      analytics-db:
        condition: service_healthy
    profiles:
      - tests

volumes:
  pg-data:
  analytics-pg-data:
  metabase-data:
  pgadmin-data:
